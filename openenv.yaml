name: project-approval-env
description: AI-based Project Approval Decision Environment

observation_space:
  project_id: int
  title: string
  budget: int
  risk_level: string
  status: string
  completeness: float

action_space:
  decision: string
  comments: string

reward:
  score: float

tasks:
  - id: task_easy
    name: "Easy Task"
    description: "Easy project approval task with high completeness and low risk"
    grader:
      type: python
      callable: "tasks.easy:grader_easy"
  
  - id: task_medium
    name: "Medium Task"
    description: "Medium difficulty project approval task with moderate completeness and risk"
    grader:
      type: python
      callable: "tasks.medium:grader_medium"
  
  - id: task_hard
    name: "Hard Task"
    description: "Hard project approval task with low completeness and high risk"
    grader:
      type: python
      callable: "tasks.hard:grader_hard"